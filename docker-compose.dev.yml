version: "3.9"

# ─── Entorno de DESARROLLO ─────────────────────────────────────────────────────
# Usa: npm run docker:dev
# Hot reload activado, sin Nginx, puertos directos.

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: ofigest_app_dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://ofigest:ofigest@db:5432/ofigest_dev
      JWT_SECRET: dev-secret-change-in-production-32chars
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      MINIO_ENDPOINT: minio
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: ofigest-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ofigest_dev

  db:
    image: postgres:16-alpine
    container_name: ofigest_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ofigest
      POSTGRES_PASSWORD: ofigest
      POSTGRES_DB: ofigest_dev
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ofigest"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ofigest_dev

  minio:
    image: minio/minio:latest
    container_name: ofigest_minio_dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_dev_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - ofigest_dev

volumes:
  postgres_dev_data:
  minio_dev_data:

networks:
  ofigest_dev:
    driver: bridge
